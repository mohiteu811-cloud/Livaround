version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: livaround_db
    environment:
      POSTGRES_USER: livaround
      POSTGRES_PASSWORD: livaround_secret
      POSTGRES_DB: livaround
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: livaround_redis
    ports:
      - '6379:6379'

volumes:
  postgres_data:
